services:
  - type: web
    name: mealplan
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mealplan-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_EMAIL
        value: hayeson@gmail.com
      - key: SERVE_STATIC
        value: "true"
      - key: DEBUG
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: CORS_ORIGINS
        value: https://mealplan-pt7s.onrender.com
    buildFilter:
      paths:
        - backend/**
        - src/**
        - package.json
        - package-lock.json
        - Dockerfile
        - index.html
        - vite.config.ts
        - tsconfig.json

databases:
  - name: mealplan-db
    plan: basic-256mb
